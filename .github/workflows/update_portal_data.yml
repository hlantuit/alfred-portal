name: Update portal data

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out alfred-portal
        uses: actions/checkout@v4
        with:
          path: alfred-portal

      - name: Check out dashboard-lib
        uses: actions/checkout@v4
        with:
          repository: hlantuit/dashboard-lib
          path: dashboard-lib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate portal data
        run: |
          python dashboard-lib/generate_portal_data.py \
            --out-dir alfred-portal/data

      - name: Commit and push
        working-directory: alfred-portal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/conditions_latest.json data/wind_grid_latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update portal conditions and wind grid [skip ci]"
            git push
          fi
