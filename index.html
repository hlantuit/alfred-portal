<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alfred — Environmental Dashboards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/alfred-logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --alfred-blue:#00ACE8;
    --alfred-blue-deep:#0B8FC2;
    --card-bg:#E5F2FC;
    --ink:#1A1A1A;
    --body:#5B6672;
    --rule:#E9EEF2;
    --green:#3FA772;
    --orange:#F5A623;
    --red:#E0483E;
    --bg:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;}
  #map{position:absolute;inset:0;background:#A8C8DC;}

  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;
    box-sizing:border-box;
    background:linear-gradient(180deg,rgba(255,255,255,0.97),rgba(255,255,255,0.85) 70%,rgba(255,255,255,0));
    pointer-events:none;
  }
  .brand-block{min-width:0;}
  .brand-block .brand{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-block .sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .logo-tile{
    width:38px;height:38px;border-radius:9px;background:var(--alfred-blue);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,140,190,0.35);
    flex-shrink:0;
  }
  .logo-tile svg{width:20px;height:20px;}
  .brand-block .brand{font-size:15px;font-weight:700;letter-spacing:0.01em;color:var(--ink);line-height:1.1;font-family:"Trebuchet MS","Trebuchet-MS",Trebuchet,sans-serif;}
  .brand-block .sub{font-size:11.5px;color:var(--body);margin-top:2px;}

  .badge{
    position:absolute;top:14px;right:14px;z-index:1000;
    background:#FFF7E8;border:1px solid #F1D9A6;border-radius:8px;
    padding:5px 10px;font-size:11px;color:#8A6A1D;font-weight:600;
  }
  .fullscreen-btn{
    position:absolute;bottom:54px;right:14px;z-index:1000;
    background:var(--alfred-blue);color:#fff;border:none;border-radius:8px;
    padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,140,190,0.35);
    display:flex;align-items:center;gap:6px;text-decoration:none;
    font-family:inherit;
  }
  .fullscreen-btn:hover{background:var(--alfred-blue-deep);}
  /* Hide the button when already running full-page (not inside an iframe) */
  .in-iframe .fullscreen-btn{display:flex;}
  body:not(.in-iframe) .fullscreen-btn{display:none;}

  .legend{
    position:absolute;bottom:14px;left:14px;right:14px;z-index:1000;
    background:#fff;border:1px solid var(--rule);box-shadow:0 4px 16px rgba(20,40,60,0.08);
    border-radius:12px;padding:10px 14px;font-size:11.5px;color:var(--body);
    max-width:230px;line-height:1.5;
    margin:0;
  }
  @media (max-width:480px){
    .legend{max-width:calc(100% - 28px);font-size:11px;}
    .sub{display:none;}
  }
  .legend b{color:var(--ink);}

  .leaflet-popup-content-wrapper{
    background:#fff;color:var(--ink);border:1px solid var(--rule);
    border-radius:12px;box-shadow:0 8px 24px rgba(20,40,60,0.12);
  }
  .leaflet-popup-tip{background:#fff;}
  .popup-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--ink);}
  .popup-card{background:var(--card-bg);border-radius:10px;padding:8px 10px;margin-bottom:6px;}
  .popup-row{font-size:12px;color:var(--body);display:flex;justify-content:space-between;gap:14px;margin:1px 0;}
  .popup-row b{color:var(--ink);font-weight:700;}
  .popup-link{
    display:inline-block;margin-top:6px;font-size:12px;color:var(--alfred-blue-deep);
    text-decoration:none;font-weight:600;
  }
  .popup-link:after{content:" →";}
  .leaflet-control-attribution{
    font-size:10px;background:rgba(255,255,255,0.85);color:var(--body);
  }
  .site-label{
    background:none;border:none;box-shadow:none;
    font-size:11px;font-weight:700;color:#1a2e40;
    text-shadow:0 1px 3px #fff,0 -1px 3px #fff,1px 0 3px #fff,-1px 0 3px #fff;
    white-space:nowrap;padding:0 2px;
  }
  .site-label::before{display:none;}
</style>
</head>

// ---------- Helpers ----------
function degToCompass(deg) {
  if (deg == null) return '—';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

function fmtTemp(c) { return c != null ? c.toFixed(1) + ' °C' : '—'; }
function fmtWind(kmh, deg) {
  if (kmh == null) return '—';
  return kmh.toFixed(0) + ' km/h ' + degToCompass(deg);

function weatherIcon(code) {
  if (code == null) return '';
  if (code === 0)   return '&#x2600;&#xFE0F;';   // ☀️
  if (code <= 2)    return '&#x1F324;&#xFE0F;';  // 🌤️

  if (code <= 79)   return '&#x2744;&#xFE0F;';   // ❄️
  if (code <= 84)   return '&#x1F326;&#xFE0F;';  // 🌦️
  if (code <= 94)   return '&#x1F328;&#xFE0F;';  // 🌨️
  return '&#x26C8;&#xFE0F;';                      // ⛈️

function windArrow(deg) {
  if (deg == null) return '';

  const toward = (deg + 180) % 360;
  return `<svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:middle;transform:rotate(${toward}deg)" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg>`;

    const swirl = Math.sin(dx*3) * Math.cos(dy*3) * 0.6;
    const dir = -2.35 + swirl;
    const speed = 0.8 + 0.5*Math.sin(dx*2 + dy*2);
    return { u: Math.cos(dir)*speed, v: Math.sin(dir)*speed, speed };
  }
  const { bounds, nx, ny, u: uGrid, v: vGrid } = windGrid;
  const iF = (lon - bounds.west)  / (bounds.east  - bounds.west)  * (nx - 1);
  const jF = (lat - bounds.south) / (bounds.north - bounds.south) * (ny - 1);
  const i0 = Math.max(0, Math.min(nx-2, Math.floor(iF)));
  const j0 = Math.max(0, Math.min(ny-2, Math.floor(jF)));
  const i1 = i0 + 1, j1 = j0 + 1;
  const di = iF - i0, dj = jF - j0;
  const bilinear = (g) =>
    g[j0][i0]*(1-di)*(1-dj) + g[j0][i1]*di*(1-dj) +
    g[j1][i0]*(1-di)*dj     + g[j1][i1]*di*dj;
  const u = bilinear(uGrid), v = bilinear(vGrid);
  return { u, v, speed: Math.sqrt(u*u + v*v) };
}

if (window.self !== window.top) document.body.classList.add('in-iframe');

// Signal desired iframe height to parent (picked up by Notion and other embed hosts)
function reportHeight() {
  const h = document.documentElement.scrollHeight || window.innerHeight;
  try { window.parent.postMessage({ type: 'setHeight', height: h }, '*'); } catch(e) {}
  try { window.parent.postMessage(h, '*'); } catch(e) {}
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
setTimeout(reportHeight, 500);

// ---------- Live data fetch ----------
(async () => {
  try {
    const [sitesData, condData, gridData] = await Promise.all([
      fetch('data/sites.json').then(r => r.json()),
      fetch('data/conditions_latest.json').then(r => r.json()).catch(() => null),
      fetch('data/wind_grid_latest.json').then(r => r.json()).catch(() => null),
    ]);

    if (gridData) windGrid = gridData;

    const conds = condData ? condData.sites : {};
    const ts = condData ? condData.generated_utc : null;

    // Update badge
    const badge = document.getElementById('badge');
    if (ts) {
      badge.textContent = 'Updated ' + ts.replace('T', ' ').replace('Z', ' UTC');
      badge.style.background = '#EAF5EC';
      badge.style.border = '1px solid #A8D5AF';
      badge.style.color = '#2A6E37';
    } else {
      badge.textContent = 'Conditions not yet generated — run workflow';
      badge.style.background = '#FFF7E8';
      badge.style.border = '1px solid #F1D9A6';
      badge.style.color = '#8A6A1D';
    }

    // Create site markers and collect positions for fitBounds
    const markerLatLngs = [];
    sitesData.forEach(s => {
      markerLatLngs.push([s.lat, s.lon]);
      const c = conds[s.id] || {};
      const marker = L.marker([s.lat, s.lon], {icon: siteIcon}).addTo(map);
      const popupContent = `
        <div class="popup-title">${weatherIcon(c.weather_code)}&nbsp;${s.name}</div>
        <div class="popup-card">
          <div class="popup-row"><span>Air temp</span><b>${fmtTemp(c.air_temp_c)}</b></div>
          <div class="popup-row"><span>Wind</span><b>${windArrow(c.wind_dir_deg)}&nbsp;${fmtWind(c.wind_kmh, c.wind_dir_deg)}</b></div>
        </div>
        <a class="popup-link" href="${s.dashboard}" target="_blank">Open full dashboard</a>
      `;
      // Per-site label placement to prevent overlap.
      // Direction and pixel offset chosen for the fixed Arctic geography.
      const labelPlacement = {
        'barrow':        {direction: 'right',  offset: [18,  0]},
        'prudhoe-bay':   {direction: 'right',  offset: [18,  0]},
        'herschel':      {direction: 'top',    offset: [0,  -18]},
        'shingle-point': {direction: 'left',   offset: [-18, 0]},
        'police-cabin':  {direction: 'left',   offset: [-18, 0]},
        'aklavik':       {direction: 'left',   offset: [-18, 0]},
        'trail-valley':  {direction: 'right',  offset: [18,  0]},
        'inuvik':        {direction: 'bottom', offset: [0,   18]},
        'tuktoyaktuk':   {direction: 'top',    offset: [0,  -18]},
        'paulatuk':      {direction: 'bottom', offset: [0,   18]},
        'sachs-harbour': {direction: 'top',    offset: [0,  -18]},
        'ulukhaktok':    {direction: 'right',  offset: [18,  0]},
      };
      const lp = labelPlacement[s.id] || {direction: 'right', offset: [18, 0]};
      marker.bindPopup(popupContent);
      marker.bindTooltip(s.name, {permanent: true, direction: lp.direction, offset: lp.offset, className: 'site-label'});
      marker.on('mouseover', function() { this.openPopup(); });
    });

    if (markerLatLngs.length) {
      map.fitBounds(markerLatLngs, { padding: [40, 40] });
      resizeCanvas();
      initParticles(); // explicit init right after bounds are set — no 'load' event needed
    }

  } catch (err) {
    console.error('Portal data fetch failed:', err);
    document.getElementById('badge').textContent = 'data unavailable';
  }
})();

// ---------- Particle canvas overlay ----------
// position:fixed in <body> at z-index:600 — above Leaflet's tile/overlay panes
// (200/400 within the map-pane stacking context) and above the map-pane itself.
// latLngToContainerPoint() returns viewport-absolute coords that match directly.
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:600;';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const size = map.getSize();
  const w = size.x || window.innerWidth;
  const h = size.y || window.innerHeight;
  // Only reassign if dimensions actually changed — assigning canvas.width/height
  // always resets the context and clears all pixels, even with the same value.
  if (canvas.width !== w) canvas.width  = w;
  if (canvas.height !== h) canvas.height = h;
}
map.on('resize', resizeCanvas);
resizeCanvas(); // size immediately from CSS layout

const N_PARTICLES = 650;
let particles = [];
let particlesReady = false;

const GRID_LAT_S = 62.0, GRID_LAT_N = 78.0, GRID_LON_W = -175.0, GRID_LON_E = -110.0;
const TRAIL_LEN = 18;

function spawnParticle() {
  const b = map.getBounds();
  const latS = Math.max(b.getSouth(), GRID_LAT_S);
  const latN = Math.min(b.getNorth(), GRID_LAT_N);
  const lonW = Math.max(b.getWest(),  GRID_LON_W);
  const lonE = Math.min(b.getEast(),  GRID_LON_E);
  return {
    lat: latS + Math.random() * (latN - latS),
    lon: lonW + Math.random() * (lonE - lonW),
    age: Math.random() * 80,
    trail: []
  };
}
function initParticles() {
  try {
    const next = [];
    for (let i = 0; i < N_PARTICLES; i++) next.push(spawnParticle());
    particles = next;
    particlesReady = true;
  } catch(e) {
    console.warn('[wind] initParticles failed:', e);
  }
}

function speedColor(sp) {
  // Plasma colormap starting at visible purple (skip near-black dark end).
  // 0 m/s → bright purple, ~10 m/s → magenta/pink, 20+ m/s → yellow.
  // tAdj shifts the input into [0.2, 1.0] of the full plasma range so the
  // darkest stop (#0d0887) is never used — it's invisible on a light basemap.
  const t = Math.min(sp / 8, 1);  // 8 m/s (~29 km/h) = full yellow
  const tAdj = 0.2 + t * 0.8;
  const stops = [
    [0.00, [13,   8, 135]],
    [0.25, [126,  3, 168]],
    [0.50, [204, 71, 120]],
    [0.75, [248,149,  64]],
    [1.00, [240,249,  33]],
  ];
  let i = 0;
  while (i < stops.length - 2 && tAdj > stops[i+1][0]) i++;
  const [t0, c0] = stops[i], [t1, c1] = stops[i+1];
  const f = (tAdj - t0) / (t1 - t0);
  const r = Math.round(c0[0] + f*(c1[0]-c0[0]));
  const g = Math.round(c0[1] + f*(c1[1]-c0[1]));
  const b = Math.round(c0[2] + f*(c1[2]-c0[2]));
  return `rgba(${r},${g},${b},`;
}

function step() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (particlesReady) try {
    particles.forEach(p => {
      // Reset any particle that has acquired NaN coordinates (bilinear crash guard).
      if (!isFinite(p.lat) || !isFinite(p.lon)) { Object.assign(p, spawnParticle()); return; }

      const w   = windAt(p.lat, p.lon);
      const p0  = map.latLngToContainerPoint([p.lat, p.lon]);
      const spd = w.speed || 0.01;
      const factor = Math.min(spd / 5, 2.5) + 0.15;
      const dx  = (w.u / spd) * 1.8 * factor;
      const dy  = -(w.v / spd) * 1.8 * factor;

      // Store current screen position in particle trail history.
      p.trail.push({x: p0.x, y: p0.y});
      if (p.trail.length > TRAIL_LEN) p.trail.shift();

      // Draw fading trail: oldest segment = transparent, newest = fully opaque.
      const color = speedColor(w.speed);
      for (let i = 1; i < p.trail.length; i++) {
        const alpha = (i / p.trail.length) * 0.80;
        ctx.strokeStyle = color + alpha + ')';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.trail[i - 1].x, p.trail[i - 1].y);
        ctx.lineTo(p.trail[i].x,     p.trail[i].y);
        ctx.stroke();
      }

      // Advance particle geographically.
      const ll = map.containerPointToLatLng(L.point(p0.x + dx, p0.y + dy));
      p.lat = ll.lat;
      p.lon = ll.lng;
      p.age += 1;

      const outOfGrid = windGrid && (p.lat < GRID_LAT_S || p.lat > GRID_LAT_N || p.lon < GRID_LON_W || p.lon > GRID_LON_E);
      if (p.age > 90 || outOfGrid || p0.x < -20 || p0.x > canvas.width + 20 || p0.y < -20 || p0.y > canvas.height + 20) {
        Object.assign(p, spawnParticle());
      }
    });
  } catch(e) {
    console.warn('[wind] step error (loop continues):', e);
  }

  requestAnimationFrame(step);
}
step();
</script>
</body>
</html>
