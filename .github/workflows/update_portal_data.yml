name: Update portal data

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - run: pip install requests pillow matplotlib numpy notion-client cairosvg xarray netcdf4 scipy

      # Regenerate sites.json + conditions + wind grid from communities/
      - name: Generate portal data
        run: python scripts/generate_portal_data.py --out-dir data

      # Update Notion dashboards using dashboard_lib (vendored at repo root)
      - name: Update Notion dashboards
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SENTINEL_HUB_CLIENT_ID: ${{ secrets.SENTINEL_HUB_CLIENT_ID }}
          SENTINEL_HUB_CLIENT_SECRET: ${{ secrets.SENTINEL_HUB_CLIENT_SECRET }}
        run: python scripts/generate_dashboards.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sites.json data/conditions_latest.json data/wind_grid_latest.json
          git add cache/ 2>/dev/null || true

          # Chart images — use find to avoid silent glob-expansion failures
          PNG_COUNT=$(find communities -path "*/charts/*.png" 2>/dev/null | wc -l)
          echo "Chart PNGs found: $PNG_COUNT"
          if [ "$PNG_COUNT" -gt 0 ]; then
            find communities -path "*/charts/*.png" -exec git add {} +
          fi

          # Auto-fetched GeoJSON overlays
          find communities -name "coastline_data.geojson" -exec git add {} + 2>/dev/null || true
          find communities -name "water_bodies.geojson"   -exec git add {} + 2>/dev/null || true

          echo "Staged files:"
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update portal data [skip ci]"
            git pull -X ours origin main
            git push
          fi
