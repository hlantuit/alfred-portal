name: Update portal data

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      # Regenerate sites.json + conditions + wind grid from communities/
      - name: Generate portal data
        run: python scripts/generate_portal_data.py --out-dir data

      # NOTE: generate_dashboards.py is disabled until blocks are fully ported
      # from the old per-site dashboard_update.py scripts.
      # Re-enable by uncommenting the step below once blocks are ready.
      # - name: Update Notion dashboards
      #   env:
      #     NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      #   run: python scripts/generate_dashboards.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sites.json data/conditions_latest.json data/wind_grid_latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update portal data [skip ci]"
            git push
          fi
